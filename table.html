<!DOCTYPE html>
<html>
    <head>
        <title>My Table</title>
    </head>
    <body>
        <table border = "1">
            <caption>Student Information</caption>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Grade</th>
            </tr>
            <tr>
                <td>Alice</td>
                <td>20</td>
                <td>A</td>
            </tr>
            <tr>
                <td>Bob</td>
                <td>22</td>
                <td>B</td>
            </tr>
            <ul>
                <li>Item 1</li>
                <li>Item 2</li>
                <li>Item 3
                    <ul>
                        <li>Subitem 1</li>
                        <li>Subitem 2
                            <ul>
                                <li>Subsubitem 1</li>
                                <li>Subsubitem 2</li>
                            </ul>
                        </li>
                    </ul>
                </li>
            </ul>
        </table>

        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name"><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email"><br><br>
            <input type="submit" value="Submit">
        </form>
        
    </body>
</html>
