<!DOCTYPE html>
<html>
    <head>
        <title>My Table</title>
    </head>
    <body>
        <table border = 1>
            <caption>Student Information</caption>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Grade</th>
            </tr>
            <tr>
                <td>Alice</td>
                <td>20</td>
                <td>A</td>
            </tr>
            <tr>
                <td>Bob</td>
                <td>22</td>
                <td>B</td>
            </tr>

        </table>
        
    </body>
</html>
